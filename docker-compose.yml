services:
  # Mailpit — local SMTP + web UI for testing emails
  mailpit:
    image: axllent/mailpit:v1.21
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

  # PostgreSQL database with persistent volume
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: finance_tracker
      POSTGRES_USER: financetrack
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U financetrack -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Next.js application
  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      POSTGRES_URL: postgresql://financetrack:${POSTGRES_PASSWORD}@db:5432/finance_tracker
      DATABASE_SSL: "false"       # internal Docker network — no SSL needed
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      NODE_ENV: production
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: ${SMTP_FROM:-FinanceTrack <noreply@financetrack.local>}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health 2>/dev/null || wget -qO- http://localhost:3000/ 2>/dev/null | grep -q html"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  postgres_data:
